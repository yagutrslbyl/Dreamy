services:
  app:
    build: .
    container_name: dreamy-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_URL=jdbc:mysql://db:3306/dreamy_db?useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      - DB_USERNAME=root
      - DB_PASSWORD=rootpassword
      - DDL_AUTO=update
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dreamy-network

  db:
    image: mysql:8.0
    container_name: dreamy-db
    environment:
      - MYSQL_DATABASE=dreamy_db
      - MYSQL_ROOT_PASSWORD=rootpassword
    volumes:
      - dreamy-db-data:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - dreamy-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  dreamy-network:
    driver: bridge

volumes:
  dreamy-db-data: